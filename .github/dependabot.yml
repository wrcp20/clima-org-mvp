version: 2
updates:
  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly
      day: monday
    labels:
      - "chore"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: pip
    directory: /dashboard
    schedule:
      interval: weekly
      day: monday
    labels:
      - "chore"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - "ci/cd"
    commit-message:
      prefix: "ci(deps)"
