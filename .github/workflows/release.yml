name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install & test
        run: |
          pip install -r api/requirements.txt
          cd api && python -m pytest tests/ -v

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build images
        run: |
          docker build ./api -t ghcr.io/${{ github.repository }}/api:${{ steps.version.outputs.VERSION }}
          docker build ./dashboard -t ghcr.io/${{ github.repository }}/dashboard:${{ steps.version.outputs.VERSION }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        run: |
          docker push ghcr.io/${{ github.repository }}/api:${{ steps.version.outputs.VERSION }}
          docker push ghcr.io/${{ github.repository }}/dashboard:${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Release ${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            docker-compose.yml
            .env.example
